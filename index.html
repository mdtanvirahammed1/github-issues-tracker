<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .active-tab { 
        background-color: #4f46e5 !important; 
        color: white !important; 
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen font-sans">

    <div id="loginPage" class="flex justify-center items-center h-screen">
      <div class="bg-white w-96 p-8 rounded-lg shadow-md">
        <div class="flex justify-center mb-4">
          <img src="assets/github-logo.png" class="w-16 h-16" alt="Logo" />
        </div>
        <h2 class="text-center text-xl font-semibold">GitHub Issues Tracker</h2>
        <p class="text-center text-gray-500 text-sm mb-6">Sign in to manage your issues</>
        
        <label class="text-sm font-medium">Username</label>
        <input id="username" type="text" placeholder="Enter Username" class="w-full border p-2 rounded mt-1 mb-1" />
        <p class="text-blue-600 text-xs mb-3">Default: admin</p>
        
        <label class="text-sm font-medium">Password</label>
        <input id="password" type="password" placeholder="Enter Password" class="w-full border p-2 rounded mt-1 mb-1" />
        <p class="text-blue-600 text-xs mb-4">Default: admin123</p>
        
        <button onclick="login()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-2 rounded font-medium hover:opacity-90 transition">
          Sign In 
        </button>

        <div class="flex items-center my-5">
          <div class="flex-grow border-t"></div>
          <span class="mx-3 text-sm text-gray-500">OR</span>
          <div class="flex-grow border-t"></div>
        </div>

        <div class="bg-gray-100 p-4 rounded text-sm text-center">
          <p>Demo Credentials:</p>
          <p class="mt-2"><b>Username:</b> admin</p>
          <p><b>Password:</b> admin123</p>
        </div>
      </div>
    </div>

    <div id="dashboard" class="hidden">
      <nav class="bg-white shadow p-4 flex flex-wrap justify-between items-center px-4 md:px-10 gap-4">
        <h1 class="text-xl font-bold flex items-center gap-2">
          <img src="assets/github-logo.png" class="w-6" alt="Logo" /> 
          GitHub Issues Tracker 
        </h1>
        <div class="flex gap-2 w-full md:w-auto">
          <input id="searchInput" type="text" placeholder="Search issues" class="border p-2 rounded flex-grow md:w-64" />
          <button onclick="searchIssue()" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 transition">Search</button>
        </div>
      </nav>

      <div class="container mx-auto p-4 md:p-10">
        
        <div class="flex gap-4 mb-6 overflow-x-auto pb-2">
          <button id="btn-all" onclick="filterIssues('all')" class="active-tab px-6 py-2 rounded-full font-medium bg-white shadow whitespace-nowrap">All</button>
          <button id="btn-open" onclick="filterIssues('open')" class="px-6 py-2 rounded-full font-medium bg-white shadow whitespace-nowrap">Open</button>
          <button id="btn-closed" onclick="filterIssues('closed')" class="px-6 py-2 rounded-full font-medium bg-white shadow whitespace-nowrap">Closed</button>
        </div>

        <div class="bg-white p-6 rounded-t-xl border-b flex flex-wrap justify-between items-center shadow-sm gap-4">
          <div class="flex items-center gap-4">
            <div class="bg-indigo-100 p-3 rounded-full flex items-center justify-center">
               <img src="assets/Aperture.png" alt="Issue Icon" class="w-6 h-6" />
                </div>
            <div>
              <h2 id="issueCount" class="text-xl font-bold text-gray-800">0 Issues</h2>
              <p class="text-sm text-gray-500">Track and manage your project issues</p>
            </div>
          </div>

          <div class="flex gap-4 text-sm font-medium">
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 bg-green-500 rounded-full"></span> Open
            </div>
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 bg-purple-500 rounded-full"></span> Closed
            </div>
          </div>
        </div>

        <div id="spinner" class="hidden flex justify-center py-10 bg-white">
          <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600"></div>
        </div>

        <div id="issuesContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 bg-white p-6 rounded-b-xl shadow-sm min-h-[200px]">
          </div>
      </div>
    </div>

    <div id="issueModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-4 backdrop-blur-sm">
      <div class="bg-white rounded-xl w-full max-w-lg p-6 relative animate-in fade-in zoom-in duration-300">
        <h3 class="text-lg font-bold border-b pb-2 mb-4">Issue Details</h3>
        <button onclick="closeModal()" class="absolute top-4 right-4 text-2xl font-bold text-gray-400 hover:text-gray-600">&times;</button>
        <div id="modalContent">
          </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
